services:
  - type: web
    name: app-tracker
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: app-tracker-db
          property: connectionString

databases:
  - name: app-tracker-db
    databaseName: apptracker
    user: apptracker
    plan: free
